<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=101">

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(91, 129, 255, 0.18) 0%, rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #f7f9ff 0%, #eef3ff 100%) !important;
      color: #0f172a;
    }

    .novo-topo {
      width: calc(100% - 64px);
      margin: 28px auto 22px;
      padding: 26px 28px;
      border-radius: 28px;
      background: linear-gradient(135deg, #0f1f4d 0%, #1a2f6b 48%, #2948a3 100%);
      box-shadow:
        0 18px 45px rgba(15, 31, 77, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .novo-topo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.16), transparent 22%),
        radial-gradient(circle at 80% 10%, rgba(122,162,255,0.20), transparent 20%);
      pointer-events: none;
    }

    .topo-esquerda,
    .topo-centro,
    .topo-direita {
      position: relative;
      z-index: 1;
    }

    .topo-centro {
      flex: 1;
      text-align: center;
    }

    .topo-centro h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 6px 18px rgba(0,0,0,0.20);
    }

    .topo-centro p {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      color: rgba(230, 238, 255, 0.92);
    }

    .topo-direita {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 120px;
    }

    .logo-topo-img {
      max-width: 74px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.20));
    }

    .status-topo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(34, 197, 94, 0.28);
    }

    .painel-shell {
      width: calc(100% - 64px);
      margin: 0 auto 30px;
      padding: 22px;
      border-radius: 30px;
      background: linear-gradient(135deg, #273142 0%, #2e394d 100%);
      box-shadow:
        0 24px 50px rgba(15, 23, 42, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.06);
      box-sizing: border-box;
    }

    .pontos-box {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: flex-start;
    }

    .card-ponto {
      width: 292px;
      border-radius: 26px;
      padding: 14px;
      box-sizing: border-box;
      background: linear-gradient(180deg, #132a64 0%, #102454 100%);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 18px 35px rgba(2, 6, 23, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card-ponto:hover {
      transform: translateY(-4px);
      box-shadow:
        0 24px 42px rgba(2, 6, 23, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .card-status-topo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: #ffb4b4;
      font-size: 14px;
      font-weight: 700;
    }

    .status-bolinha {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff355d;
      box-shadow: 0 0 0 4px rgba(255, 53, 93, 0.15);
      display: inline-block;
      flex-shrink: 0;
    }

    .card-imagem-box {
      width: 100%;
      height: 180px;
      border-radius: 20px;
      overflow: hidden;
      background: #dfe5ef;
      margin-bottom: 14px;
    }

    .card-imagem {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .card-conteudo {
      color: #ffffff;
    }

    .card-nome {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .card-info-linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-cidade {
      font-size: 14px;
      font-weight: 600;
      color: rgba(237, 242, 255, 0.95);
      line-height: 1.3;
      flex: 1;
    }

    .card-codigo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .card-codigo {
      padding: 5px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: #bcd0ff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .btn-copiar {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.09);
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .btn-copiar:hover {
      background: rgba(255,255,255,0.16);
      transform: scale(1.04);
    }

    .card-acoes {
      margin-top: 8px;
    }

    .btn-abrir {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #5c79f0 0%, #6d87f6 100%);
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(92, 121, 240, 0.30);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .btn-abrir:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(92, 121, 240, 0.36);
      filter: brightness(1.03);
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at top, rgba(91, 129, 255, 0.20) 0%, rgba(255,255,255,0) 30%),
        linear-gradient(180deg, #f7f9ff 0%, #edf3ff 100%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 32px 28px;
      border-radius: 26px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 55px rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(255,255,255,0.70);
      box-sizing: border-box;
      text-align: center;
    }

    .login-card h2 {
      margin: 0 0 18px;
      font-size: 28px;
      color: #16213e;
    }

    #senhaInput {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: 1px solid #d8e1f2;
      padding: 0 14px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 14px;
      background: #ffffff;
    }

    #senhaInput:focus {
      border-color: #6a84f3;
      box-shadow: 0 0 0 4px rgba(106, 132, 243, 0.14);
    }

    #btnLogin {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #193b8c 0%, #5c79f0 100%);
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(25, 59, 140, 0.22);
    }

    .login-erro {
      min-height: 20px;
      margin: 12px 0 0;
      color: #dc2626;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .novo-topo {
        flex-direction: column;
        text-align: center;
      }

      .topo-direita {
        align-items: center;
      }

      .painel-shell,
      .novo-topo {
        width: calc(100% - 28px);
      }

      .pontos-box {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

      <button id="btnLogin" type="button">Entrar</button>
      <p id="loginErro" class="login-erro"></p>
