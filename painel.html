<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=101">
</head>
<body>

  <!-- LOGIN -->
  <div id="loginBox" class="login-screen">
    <div class="login-card">
      <h2>Acesso ao Painel</h2>
      <input type="password" id="senhaInput" placeholder="Digite o código">
      <button id="btnLogin" type="button">Entrar</button>
      <p id="loginErro" class="login-erro"></p>
    </div>
  </div>

  <!-- PAINEL -->
  <div id="conteudoPainel" style="display:none;">
    
    <div class="topo-fixo novo-topo">

      <!-- TOPO CENTRAL -->
      <div class="topo-centro">
        <h1>Gerenciador de Pontos</h1>
        <p>Gerencie seus pontos e playlists.</p>
      </div>

      <!-- TOPO DIREITA -->
      <div class="topo-direita">
        <img src="logo.png" class="logo-topo-img" alt="Duna TV">
        <div class="status-topo">Painel Ativo</div>
      </div>

    </div>

    <div class="painel-shell">
      <div id="listaPontos">
        <div class="pontos-box">

          <!-- CARD -->
          <div class="card-ponto" data-codigo="H4E9L2A">
            <div class="card-status-topo">
              <span class="status-bolinha"></span>
              <span class="card-status">Status...</span>
            </div>

            <div class="card-imagem-box">
              <img class="card-imagem" src="https://placehold.co/600x320/png" alt="">
            </div>

            <div class="card-conteudo">
              <div class="card-nome">Carregando...</div>
              <div class="card-info-linha">
                <div class="card-cidade">Cidade não definida</div>

                <div class="card-codigo-area">
                  <div class="card-codigo">H4E9L2A</div>
                  <button class="btn-copiar" data-codigo="H4E9L2A" type="button">⧉</button>
                </div>
              </div>
            </div>

            <div class="card-acoes">
              <button class="btn-abrir" data-codigo="H4E9L2A" type="button">Abrir pasta</button>
            </div>
          </div>

          <!-- DUPLICA OS CARDS NORMALMENTE -->
          <!-- (mantive só um aqui pra não ficar gigante, mas pode manter todos os seus) -->

        </div>
      </div>

      <!-- DETALHE -->
      <div id="pontoDetalhe" class="playlist-box" style="display:none;">

        <div class="playlist-topbar playlist-topbar-novo">
          <div class="topbar-esquerda">
            <button id="btnVoltar" type="button" class="btn-secundario btn-voltar-topo">← Voltar</button>
            <span class="topbar-titulo">Gerencie e organize a sua playlist</span>
          </div>

          <div class="topbar-direita">
            <div id="statusPonto" class="status-destaque"></div>
          </div>
        </div>

        <div class="playlist-header playlist-header-novo">
          <div class="playlist-topo-flex">

            <div class="playlist-imagem-box">
              <img id="imagemPonto" src="https://placehold.co/600x320/png">
            </div>

            <div class="playlist-header-textos">
              <h2 id="tituloPasta"></h2>

              <div class="playlist-info-extra">
                <div id="cidadePonto"></div>
                <div id="enderecoPonto"></div>
              </div>

              <div class="playlist-codigo-linha">
                <span id="codigoAtual"></span>
                <button id="btnCopiarCodigo" type="button">⧉</button>
              </div>

              <div class="playlist-acoes-topo">
                <button id="btnEditarInfo" type="button">Editar informações</button>
              </div>
            </div>

          </div>
        </div>

        <div class="playlist-layout-novo">

          <div class="playlist-coluna-ativa">
            <div class="playlist-secao">
              <h4>Playlist ativa</h4>
              <div id="playlistAtiva"></div>
            </div>
          </div>

          <div class="playlist-coluna-historico">
            <div class="playlist-secao">
              <h4>Histórico de encerramento</h4>
              <div id="historicoEncerramento"></div>
            </div>

            <div class="playlist-secao">
              <h4>Histórico de status</h4>
              <div id="historicoStatus"></div>
            </div>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modalEditar" class="modal-editar" style="display:none;">
    <div class="modal-conteudo">
      <h3>Editar Informações</h3>

      <input type="text" id="editNome" placeholder="Nome do ponto">
      <input type="text" id="editCidade" placeholder="Cidade">
      <input type="text" id="editEndereco" placeholder="Endereço">

      <div class="edit-imagem-box">
        <img id="previewImagem" src="">
        <input type="file" id="inputImagem" accept="image/*">
      </div>

      <div class="edit-botoes">
        <button id="btnSalvarEdicao" type="button">Salvar</button>
        <button id="btnFecharModal" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=99"></script>

</body>
</html>
