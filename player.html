<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV Player</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .player-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video,
    img,
    iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: 0;
    }

    .mensagem {
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 26px;
      text-align: center;
      padding: 24px;
      line-height: 1.4;
    }

    .mensagem small {
      display: block;
      margin-top: 12px;
      color: #aaa;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="mensagem">
      Carregando player...
      <small>Se esta mensagem não mudar, o JavaScript não carregou.</small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="player.js?v=8"></script>

</body>
</html>
