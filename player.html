<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV Player</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .player-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video,
    img,
    iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: 0;
    }

    .mensagem {
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 26px;
      text-align: center;
      padding: 24px;
      line-height: 1.4;
    }

    .mensagem small {
      display: block;
      margin-top: 12px;
      color: #aaa;
      font-size: 15px;
    }

    .layout-player {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 220px 1fr;
      background: #000;
    }

    .weather-sidebar {
      background: #07111f;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      padding: 22px 18px;
      box-sizing: border-box;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .weather-city {
      font-size: 20px;
      font-weight: 800;
    }

    .weather-now {
      margin-top: 18px;
    }

    .weather-temp {
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
    }

    .weather-desc {
      margin-top: 8px;
      font-size: 15px;
      color: #cbd5e1;
    }

    .weather-days {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .weather-day {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      color: #e5e7eb;
    }

    .weather-day strong {
      white-space: nowrap;
    }

    .weather-footer {
      font-size: 11px;
      color: #94a3b8;
    }

    .player-main {
      width: 100%;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .player-main video,
    .player-main img,
    .player-main iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: 0;
    }

    @media (max-width: 900px) {
      .layout-player {
        grid-template-columns: 1fr;
      }

      .weather-sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="layout-player">
    <aside class="weather-sidebar" id="weatherSidebar">
      <div>
        <div class="weather-city">Ibicuí</div>

        <div class="weather-now">
          <div class="weather-temp" id="weatherTemp">--°</div>
          <div class="weather-desc" id="weatherDesc">Carregando previsão...</div>
        </div>

        <div class="weather-days" id="weatherDays"></div>
      </div>

      <div class="weather-footer">Previsão do tempo</div>
    </aside>

    <main class="player-main" id="playerMain">
      <div class="player-container">
        <div class="mensagem">
          Carregando player...
          <small>Se esta mensagem não mudar, o JavaScript não carregou.</small>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="player.js?v=16"></script>

</body>
</html>
